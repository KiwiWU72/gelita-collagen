name: Daily GELITA Paper Update

on:
  schedule:
    - cron: '0 0 * * *' # 每天午夜 00:00 (UTC) 執行
  workflow_dispatch: # 允許你隨時手動點擊按鈕執行

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Gemini Update Script
        run: python update_papers.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 你的安全金鑰

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data.json
          git commit -m "Auto-update latest papers via Gemini" || echo "No changes to commit"
          git push
