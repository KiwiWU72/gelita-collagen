name: GELITA BCP PubMed Daily Update

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00（台灣時間 10:00）執行
  workflow_dispatch:        # 允許手動觸發

jobs:
  update-papers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Run GELITA Update Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_papers.py

      - name: Commit and Push if Updated
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GELITA Bot"
          git add data.json
          git diff --staged --quiet || \
            git commit -m "🤖 GELITA BCP 自動更新：$(date +'%Y-%m-%d') 新增論文" && \
            git push
